name: navix
description: "Navix - AI-powered project management and guidance system."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  firebase_core: ^3.9.0
  firebase_auth: ^5.4.0
  cloud_firestore: ^5.6.3
  firebase_storage: ^12.4.0
  firebase_messaging: ^15.2.0
  firebase_analytics: ^11.3.6

  flutter_bloc: ^9.0.0
  equatable: ^2.0.7
  dartz: ^0.10.1
  get_it: ^8.0.3

  go_router: ^14.6.3
  dio: ^5.7.0
  internet_connection_checker_plus: ^2.7.1

  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  table_calendar: ^3.1.2
  shimmer: ^3.0.0
  timeago: ^3.7.0

  intl: ^0.20.2
  url_launcher: ^6.3.1
  cupertino_icons: ^1.0.8
  share_plus: ^12.0.1
  markdown_widget: ^2.3.2+8
  fl_chart: ^0.70.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter_launcher_icons:
  image_path_android: "assets/images/appico_solid.png"
  image_path_ios: "assets/images/appico_solid.png"
  android: true 
  ios: true 
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/appico.png"
  adaptive_icon_monochrome: "assets/images/appico.png"
  adaptive_icon_foreground_inset: 30
  web:
    generate: true
    image_path: "assets/images/appico_solid.png"
    background_color: "#FFFFFF"
    theme_color: "#FFFFFF"
  windows:
    generate: true
    image_path: "assets/images/appico_solid.png"
    icon_size: 48 
  macos:
    generate: true
    image_path: "assets/images/appico_solid.png"  

flutter_native_splash:
  color: "#FFFFFF" # Background color
  image: "assets/images/navi_splash.png"
  android: true
  ios: true
  web: false
  fullscreen: true
  android_gravity: center
  ios_content_mode: center
  android_12:
    image: "assets/images/navi_splash.png"
    icon_background_color: "#FFFFFF"

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/
